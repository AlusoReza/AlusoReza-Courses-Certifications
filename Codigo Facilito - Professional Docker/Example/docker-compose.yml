version: '3.8'

services:
  # --- SERVICIO 1: Backend API (Python) ---
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_api_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASS=secret_password
    depends_on:
      - db
    networks:
      - microservice_net
    volumes:
      - ./backend:/app  # Sincronización en tiempo real

  # --- SERVICIO 2: Base de Datos (PostgreSQL) ---
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: app_db
    networks:
      - microservice_net
    volumes:
      - db_data:/var/lib/postgresql/data

  # --- SERVICIO 3: Frontend (Ej. React o Nginx) ---
  frontend:
    image: nginx:alpine
    container_name: web_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    networks:
      - microservice_net

# --- REDES Y VOLÚMENES ---
networks:
  microservice_net:
    driver: bridge

volumes:
  db_data: